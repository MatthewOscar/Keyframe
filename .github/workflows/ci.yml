name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-tests:
    name: Full tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.18"
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install native tools (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes ffmpeg tesseract-ocr
      - name: Install native tools (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg tesseract
      - name: Install project
        run: uv sync --frozen --group dev
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run mypy src
      - name: Test
        run: uv run pytest
      - name: Build and inspect distributions
        run: uv build && uv run twine check dist/*

  windows-smoke:
    name: Windows unit and package smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.9.18"
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project
        run: uv sync --frozen --group dev
      - name: Run non-integration tests
        run: uv run pytest -m "not integration and not e2e"
      - name: Import smoke
        run: uv run python -c "import video_context_mcp; print(video_context_mcp.__version__)"
      - name: Build and inspect distributions
        run: uv build && uv run twine check dist/*
